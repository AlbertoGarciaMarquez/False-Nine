<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>False Nine</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--surface:#141414;--s2:#1c1c1c;--s3:#222;
  --green:#1a5c2e;--gb:#2d9e52;--gg:#3dbd65;
  --cream:#e8e4d4;--dim:#9e9a8a;--faint:#3a3a38;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --amber:#d4890a;--red:#e05050;--blue:#1a6fa0;
}
html,body{min-height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--cream);}

/* PAGES */
.pg{display:none;min-height:100vh;}
.pg.on{display:flex;flex-direction:column;}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 80px;width:100%;}

/* NAV */
.nav{background:rgba(13,13,13,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.nav-i{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 16px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;cursor:pointer;}
.logo span{color:var(--gb);}
.nav-tabs{display:flex;gap:2px;}
.ntab{font-size:11px;font-weight:600;letter-spacing:.06em;padding:6px 12px;border-radius:5px;cursor:pointer;color:var(--dim);border:none;background:transparent;transition:all .15s;}
.ntab.on{background:var(--s2);color:var(--cream);}

/* TYPOGRAPHY */
.sl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sl::after{content:'';flex:1;height:1px;background:var(--border);}

/* BUTTONS */
.btn{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;border:none;border-radius:7px;cursor:pointer;transition:all .15s;display:block;width:100%;text-align:center;}
.btn-lg{font-size:18px;padding:14px 0;}
.btn-md{font-size:15px;padding:10px 20px;width:auto;display:inline-block;}
.bg{background:var(--green);color:var(--cream);}
.bg:hover{background:var(--gb);}
.bgh{background:transparent;color:var(--dim);border:1px solid var(--border2);}
.bgh:hover{color:var(--cream);border-color:rgba(255,255,255,.25);}
.bamb{background:rgba(212,137,10,.15);color:var(--amber);border:1px solid rgba(212,137,10,.3);}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}

/* ── TITLE ── */
#pg-title{align-items:center;justify-content:center;text-align:center;padding:40px 16px;}
.t-logo{font-family:'Bebas Neue',sans-serif;font-size:76px;letter-spacing:6px;line-height:1;margin-bottom:6px;}
.t-logo span{color:var(--gb);}
.t-tag{font-size:13px;color:var(--dim);margin-bottom:40px;letter-spacing:.04em;}
.name-input-wrap{width:100%;max-width:360px;margin-bottom:12px;}
.name-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;text-align:left;}
.name-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:13px 16px;font-size:16px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:var(--cream);outline:none;text-align:center;transition:border-color .15s;}
.name-input:focus{border-color:var(--gb);}
.name-input::placeholder{color:var(--faint);letter-spacing:1px;}
.start-btn-wrap{width:100%;max-width:360px;}
.t-note{font-size:11px;color:var(--faint);margin-top:16px;}

/* ── DRAFT ── */
#pg-draft{align-items:stretch;}
.draft-header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 16px;text-align:center;flex-shrink:0;}
.dh-progress{display:flex;justify-content:center;gap:4px;margin-bottom:14px;}
.dp-dot{width:18px;height:4px;border-radius:2px;background:var(--s2);transition:background .3s;}
.dp-dot.done{background:var(--gb);}
.dp-dot.active{background:var(--amber);}
.dh-pos{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--cream);line-height:1;}
.dh-pos span{color:var(--amber);}
.dh-sub{font-size:12px;color:var(--dim);margin-top:4px;}
.dh-club{font-size:13px;color:var(--gb);font-weight:600;margin-top:2px;}

.draft-cards-area{flex:1;padding:16px;display:flex;flex-direction:column;gap:0;}
.draft-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}

/* Player draft card */
.pc{background:var(--surface);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;padding:14px 12px;}
.pc:hover{transform:translateY(-3px);border-color:var(--border2);}
.pc.chosen{border-color:var(--gb);background:rgba(26,92,46,.18);transform:translateY(-3px);}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.rn::before{background:#9e9a8a;}.rb::before{background:#1a6fa0;}.re::before{background:#d4890a;}.rel::before{background:#e05050;}
.pc-ovr{font-family:'Bebas Neue',sans-serif;font-size:38px;text-align:center;line-height:1;margin-bottom:2px;}
.pc-name{font-size:12px;font-weight:600;text-align:center;color:var(--cream);margin-bottom:1px;line-height:1.2;}
.pc-club{font-size:10px;text-align:center;color:var(--dim);margin-bottom:8px;}
.pc-rare{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;display:block;text-align:center;margin-bottom:8px;}
.rn .pc-rare{background:rgba(158,154,138,.15);color:#9e9a8a;}
.rb .pc-rare{background:rgba(26,111,160,.15);color:#1a6fa0;}
.re .pc-rare{background:rgba(212,137,10,.15);color:#d4890a;}
.rel .pc-rare{background:rgba(224,80,80,.15);color:#e05050;}
.pc-ovr-color-n{color:#9e9a8a;}.pc-ovr-color-b{color:#1a6fa0;}.pc-ovr-color-e{color:#d4890a;}.pc-ovr-color-l{color:#e05050;}

/* Stat bars */
.sb{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.sbk{font-size:9px;font-weight:600;color:var(--dim);width:22px;flex-shrink:0;}
.sbt{flex:1;height:3px;background:var(--s2);border-radius:2px;overflow:hidden;}
.sbf{height:100%;border-radius:2px;}
.sv{background:#2d9e52;}.sp{background:#1a6fa0;}.sd{background:#d4890a;}.sde{background:#a040b0;}.sf{background:#c0392b;}
.sbv{font-size:9px;font-weight:600;color:var(--cream);width:16px;text-align:right;flex-shrink:0;}

/* Check mark on chosen */
.pc-check{display:none;position:absolute;top:8px;right:8px;width:20px;height:20px;background:var(--gb);border-radius:50%;align-items:center;justify-content:center;font-size:11px;}
.pc.chosen .pc-check{display:flex;}

/* Draft summary */
.draft-squad{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.ds-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:8px;}
.ds-ovr{font-family:'Bebas Neue',sans-serif;font-size:18px;min-width:28px;}
.ds-info{flex:1;}
.ds-name{font-size:11px;font-weight:600;color:var(--cream);}
.ds-pos{font-size:10px;color:var(--dim);}
.ds-pos-tag{font-size:9px;font-weight:600;background:var(--s2);color:var(--dim);padding:1px 5px;border-radius:3px;margin-right:4px;}

/* ── MAP ── */
.club-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.cb-crest{width:40px;height:40px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cb-info{flex:1;}
.cb-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;line-height:1;}
.cb-meta{font-size:11px;color:var(--dim);margin-top:2px;}
.cb-stats{display:flex;gap:14px;}
.cbs{text-align:center;}
.cbs-n{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.cbs-l{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
.ng{color:var(--gb);}.na{color:var(--amber);}.nr{color:var(--red);}

.str{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:11px;color:var(--dim);}
.st{flex:1;height:4px;background:var(--s2);border-radius:2px;overflow:hidden;}
.sf2{height:100%;background:var(--gb);border-radius:2px;transition:width .5s;}
.sp2{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--cream);}

.def-bar{display:flex;align-items:center;gap:5px;margin-bottom:16px;}
.dd{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);}
.dd.on{background:var(--red);border-color:var(--red);}
.dl{font-size:11px;color:var(--dim);margin-left:4px;}

/* Map nodes */
.map-wrap{position:relative;padding-left:54px;}
.spine{position:absolute;left:31px;top:18px;bottom:18px;width:2px;background:linear-gradient(to bottom,var(--gb) 0%,rgba(45,158,82,.04) 100%);}
.mn{display:flex;align-items:center;gap:11px;margin-bottom:5px;cursor:pointer;}
.mn-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-left:-16px;border:2px solid transparent;transition:transform .15s;position:relative;z-index:2;}
.mn:hover .mn-dot{transform:scale(1.12);}
.mn:hover .mn-body{border-color:var(--border2);}
.dm{background:#0f2a18;border-color:var(--gb);}
.ds2{background:#0a2030;border-color:#1a6fa0;}
.dt{background:#2a1a00;border-color:var(--amber);}
.de{background:#2a0a10;border-color:#c0392b;}
.dsp{background:#1a2a0a;border-color:#639922;}
.dr{background:#2a0808;border-color:#e05050;}
.dcp{background:#1e1e1e;border-color:rgba(255,255,255,.2);}
.cur{border-color:var(--gg)!important;box-shadow:0 0 0 4px rgba(61,189,101,.15),0 0 0 8px rgba(61,189,101,.05);}
.cur::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(61,189,101,.3);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0;transform:scale(1.5)}}
.done-dot{opacity:.28!important;border-color:rgba(255,255,255,.06)!important;background:var(--surface)!important;}
.mn-body{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;min-height:46px;transition:border-color .15s;}
.mn-body.act{border-color:rgba(61,189,101,.4);background:rgba(26,92,46,.1);}
.mn-body.done{opacity:.35;}
.mn-body.lck{opacity:.22;}
.mb-l{flex:1;}
.mb-t{font-size:13px;font-weight:600;color:var(--cream);line-height:1.2;}
.mb-s{font-size:11px;color:var(--dim);margin-top:2px;}
.mb-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;margin-left:8px;flex-shrink:0;}
.rp{font-family:'Bebas Neue',sans-serif;font-size:14px;padding:2px 7px;border-radius:3px;}
.rw{background:rgba(45,158,82,.2);color:var(--gb);}
.rd{background:rgba(212,137,10,.2);color:var(--amber);}
.rl{background:rgba(224,80,80,.2);color:var(--red);}
.jp{font-size:10px;font-weight:600;color:var(--dim);background:var(--s2);padding:2px 6px;border-radius:3px;}

.fork-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin:5px 0 7px 18px;display:flex;align-items:center;gap:5px;}
.fork-lbl::before{content:'';width:6px;height:6px;background:var(--amber);border-radius:50%;}
.fork-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 0 12px 18px;}
.fo{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 11px;cursor:pointer;transition:all .15s;}
.fo:hover{border-color:rgba(212,137,10,.4);}
.fo.fch{border-color:var(--amber);background:rgba(212,137,10,.07);}
.fo-t{font-size:12px;font-weight:600;color:var(--cream);margin-bottom:2px;}
.fo-s{font-size:10px;color:var(--dim);}
.fo-tag{font-size:10px;font-weight:600;margin-top:4px;padding:2px 6px;border-radius:3px;display:inline-block;}
.tge{background:rgba(45,158,82,.15);color:var(--gb);}
.tgh{background:rgba(224,80,80,.15);color:var(--red);}

.chk{background:var(--s2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin:7px 0 13px 14px;}
.chk-i{width:32px;height:32px;background:var(--s3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.chk-t{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--cream);}
.chk-s{font-size:10px;color:var(--dim);margin-top:1px;}

/* ── NODE ACTION ── */
.na-hdr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;text-align:center;}
.na-ico{font-size:32px;margin-bottom:5px;}
.na-t{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;}
.na-s{font-size:12px;color:var(--dim);margin-top:3px;}

.tg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px;cursor:pointer;transition:all .15s;}
.tc:hover{border-color:var(--border2);}
.tc.tch{border-color:var(--amber);background:rgba(212,137,10,.07);}
.tc-n{font-size:13px;font-weight:600;color:var(--cream);margin-bottom:2px;}
.tc-p{font-size:11px;color:var(--dim);}

.ev-narr{background:var(--surface);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:15px;margin-bottom:14px;font-size:13px;line-height:1.6;}
.ev-choices{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.ev-ch{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px 13px;cursor:pointer;font-size:13px;transition:all .15s;}
.ev-ch:hover{border-color:var(--border2);background:var(--s2);}
.ev-res{background:var(--s2);border-radius:7px;padding:13px;margin-bottom:14px;font-size:13px;line-height:1.6;display:none;}

.spo-box{background:rgba(26,92,46,.1);border:1px solid rgba(45,158,82,.25);border-radius:10px;padding:18px;text-align:center;margin-bottom:14px;}
.spo-amt{font-family:'Bebas Neue',sans-serif;font-size:46px;color:var(--gb);letter-spacing:2px;}
.spo-l{font-size:11px;color:var(--dim);}

/* ── PRE-MATCH ── */
.mv{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:15px;text-align:center;margin-bottom:14px;}
.mv-t{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:3px;}
.mv-tn{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;}
.mv-vs{font-size:11px;color:var(--dim);font-weight:600;}
.mv-m{font-size:11px;color:var(--dim);}
.fg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.fb{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 5px;text-align:center;cursor:pointer;transition:all .15s;}
.fb:hover{border-color:var(--border2);}
.fb.fbc{border-color:var(--gb);background:rgba(26,92,46,.15);}
.fb-n{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;}
.fb-d{font-size:10px;color:var(--dim);margin-top:1px;}
.stg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.stb{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px 7px;text-align:center;cursor:pointer;transition:all .15s;}
.stb:hover{border-color:var(--border2);}
.stb.stbc{border-color:var(--amber);background:rgba(212,137,10,.08);}
.stb-i{font-size:18px;margin-bottom:3px;}
.stb-n{font-size:11px;font-weight:600;}
.stb-d{font-size:10px;color:var(--dim);margin-top:1px;}
.pitch{background:#0a1f10;border:1px solid rgba(45,158,82,.15);border-radius:9px;padding:13px;margin-bottom:14px;position:relative;overflow:hidden;}
.xi-row{display:flex;justify-content:center;gap:7px;margin-bottom:7px;}
.xi-s{text-align:center;width:50px;}
.xi-d{width:32px;height:32px;background:rgba(45,158,82,.2);border:1px solid rgba(45,158,82,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--gb);margin:0 auto 3px;}
.xi-n{font-size:8px;color:var(--dim);line-height:1.2;}
.pc2{display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:center;margin-bottom:7px;}
.pc2-s{display:flex;flex-direction:column;}
.pc2-s.r{align-items:flex-end;}
.pc2-l{font-size:10px;font-weight:600;color:var(--dim);}
.pc2-v{font-family:'Bebas Neue',sans-serif;font-size:24px;}
.pc2-c{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--dim);text-align:center;}
.pw-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;background:var(--s2);margin-bottom:14px;}
.pw-h{height:100%;background:var(--gb);}

/* ── MATCH ── */
.scoreboard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center;margin-bottom:13px;}
.sb-t{display:flex;align-items:center;justify-content:center;gap:18px;}
.sb-tn{font-size:11px;color:var(--dim);font-weight:600;}
.sb-sc{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:5px;line-height:1;min-width:120px;text-align:center;}
.mt{height:4px;background:var(--s2);border-radius:2px;margin-top:13px;overflow:hidden;}
.mf{height:100%;background:var(--gb);border-radius:2px;transition:width .3s linear;}
.ml{font-size:11px;color:var(--dim);margin-top:4px;}
.feed{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:340px;overflow-y:auto;}
.fi{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-bottom:1px solid var(--border);animation:fi .25s ease;}
.fi:last-child{border-bottom:none;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.fi-m{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--dim);min-width:24px;padding-top:1px;}
.fi-i{font-size:16px;min-width:20px;text-align:center;}
.fi-t{font-size:12px;line-height:1.4;}
.fi-s{font-size:10px;color:var(--dim);margin-top:1px;}
.fg2 .fi-t{color:var(--gg);font-weight:600;}
.fdg .fi-t{color:var(--red);}
@keyframes gp{0%{transform:scale(1)}50%{transform:scale(1.7)}100%{transform:scale(1)}}
.fg2 .fi-i{animation:gp .35s ease;}

/* ── RESULT ── */
.rh{text-align:center;padding:26px 0 18px;}
.rh-t{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:4px;}
.rwin{color:var(--gb);}.rdrw{color:var(--amber);}.rlos{color:var(--red);}
.rh-sc{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:6px;line-height:1;}
.rh-m{font-size:11px;color:var(--dim);margin-top:3px;}
.rst{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:14px 0;}
.rs-b{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px;text-align:center;}
.rs-v{font-family:'Bebas Neue',sans-serif;font-size:24px;}
.rs-l{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-top:1px;}
.rew{background:rgba(26,92,46,.1);border:1px solid rgba(45,158,82,.25);border-radius:7px;padding:13px;margin-bottom:11px;}
.rew-t{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gb);margin-bottom:4px;}
.rew-b{font-size:13px;}
.mor{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px 13px;margin-bottom:14px;}
.mor-i{font-size:20px;}
.mor-t{font-size:12px;}
.mor-s{font-size:10px;color:var(--dim);margin-top:1px;}

/* ── SQUAD PAGE ── */
.sq-p{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px 13px;margin-bottom:7px;position:relative;overflow:hidden;}
.sq-p::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:4px 0 0 4px;}
.rn2::before{background:#9e9a8a;}.rb2::before{background:#1a6fa0;}.re2::before{background:#d4890a;}.rel2::before{background:#e05050;}
.sq-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.sq-info{flex:1;}
.sq-n{font-size:13px;font-weight:600;}
.sq-m{display:flex;align-items:center;gap:5px;margin-top:2px;}
.pt{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;background:var(--s2);color:var(--dim);}
.sq-o{font-family:'Bebas Neue',sans-serif;font-size:26px;flex-shrink:0;}

/* ── GAME OVER / CHAMP ── */
#pg-go,#pg-ch{align-items:center;justify-content:center;text-align:center;padding:40px 16px;}
.go-t{font-family:'Bebas Neue',sans-serif;font-size:76px;letter-spacing:5px;color:var(--red);line-height:1;}
.ch-t{font-family:'Bebas Neue',sans-serif;font-size:68px;letter-spacing:5px;color:var(--gb);line-height:1;}
.end-s{font-size:14px;color:var(--dim);margin:10px 0 30px;}
.end-st{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px;margin-bottom:28px;}
.es-b{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;}
.es-v{font-family:'Bebas Neue',sans-serif;font-size:30px;}
.es-l{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:1px;}

/* ── ANNOUNCE ── */
.ann{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:9px;text-align:center;padding:20px;}
.ann.on{display:flex;}
.ann-i{font-size:50px;}
.ann-t{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;}
.ann-b{font-size:13px;color:var(--dim);max-width:300px;}
.ann-card{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:14px 22px;margin-top:5px;}
.ann-cn{font-size:17px;font-weight:600;}
.ann-cp{font-size:11px;color:var(--dim);margin-top:1px;}
.ann-co{font-family:'Bebas Neue',sans-serif;font-size:44px;margin:5px 0;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
</style>
</head>

<!-- TITLE -->
<div class="pg on" id="pg-title">

</div>

<!-- NAV (hidden initially) -->
<div id="main-nav" style="display:none;">

    <div class="nav-i">

      </div>
    </div>
  </div>
</div>

<!-- DRAFT -->

</div>

<!-- DRAFT SUMMARY -->
<div class="pg" id="pg-draft-summary">

    </div>
    <div class="sl">Tu XI inicial</div>
    <div class="draft-squad" id="ds-squad"></div>
    <button class="btn btn-lg bg" onclick="startSeason()">COMENZAR TEMPORADA →</button>
  </div>
</div>

<!-- MAP -->
<div class="pg" id="pg-map">
  <div class="wrap">
    <div style="height:14px;"></div>
    <div class="club-bar" id="club-bar"></div>

    <div class="map-wrap">
      <div class="spine"></div>
      <div id="map-nodes"></div>
    </div>
  </div>
</div>

<!-- NODE -->
<div class="pg" id="pg-node">
  <div class="wrap"><div style="height:14px;"></div><div id="node-content"></div></div>
</div>

<!-- PRE-MATCH -->
<div class="pg" id="pg-pre">
  <div class="wrap"><div style="height:14px;"></div><div id="pre-content"></div></div>
</div>

<!-- MATCH -->
<div class="pg" id="pg-match">
  <div class="wrap">
    <div style="height:14px;"></div>
    <div class="scoreboard">
      <div class="sb-t">
        <div class="sb-tn" id="m-hn"></div>

        <div class="sb-tn" id="m-an"></div>
      </div>

    <div class="feed" id="m-feed"></div>
  </div>
</div>

<!-- RESULT -->
<div class="pg" id="pg-result">
  <div class="wrap"><div style="height:14px;"></div><div id="res-content"></div></div>
</div>

<!-- SQUAD -->
<div class="pg" id="pg-squad">
  <div class="wrap"><div style="height:14px;"></div><div id="sq-content"></div></div>
</div>

<!-- GAME OVER -->
<div class="pg" id="pg-go">
  <div class="go-t">GAME<br>OVER</div>
  <div class="end-s" id="go-s"></div>
  <div class="end-st" id="go-st"></div>

<!-- CHAMPION -->
<div class="pg" id="pg-ch">

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function rndI(lo,hi){return lo+Math.floor(Math.random()*(hi-lo));}
function ovr(p){return Math.round((p.vel+p.pax+p.dis+p.def+p.fis)/5);}
function tpow(sq){return sq.reduce((s,p)=>s+ovr(p),0);}
function rareClass(r){return {n:'rn',b:'rb',e:'re',l:'rel'}[r]||'rn';}
function rareLabel(r){return {n:'Normal',b:'Bueno',e:'Estrella',l:'Élite'}[r]||'Normal';}
function ovrColor(r){return {n:'pc-ovr-color-n',b:'pc-ovr-color-b',e:'pc-ovr-color-e',l:'pc-ovr-color-l'}[r]||'pc-ovr-color-n';}
function sqClass(r){return {n:'rn2',b:'rb2',e:'re2',l:'rel2'}[r]||'rn2';}
function poolToObj(arr){return {name:arr[0],club:arr[1],pos:arr[2],rare:arr[3],vel:arr[4],pax:arr[5],dis:arr[6],def:arr[7],fis:arr[8]};}

function statBars(p){
  const ks=['VEL','PAX','DIS','DEF','FÍS'],vs=[p.vel,p.pax,p.dis,p.def,p.fis],cs=['sv','sp','sd','sde','sf'];
  return ks.map((k,i)=>`<div class="sb"><span class="sbk">${k}</span><div class="sbt"><div class="sbf ${cs[i]}" style="width:${vs[i]}%"></div></div><span class="sbv">${vs[i]}</span></div>`).join('');
}

function startDraft(){
  const name = document.getElementById('club-name-input').value.trim();
  G.clubName = name||'MI CLUB';
  draftStep=0; draftPicks=[]; draftSelected=-1; draftResolvedPos=[];

  renderDraftStep();
}

function renderDraftStep(){
  const step = DRAFT_ORDER[draftStep];
  const isSub = draftStep >= 11;

  // Resolve position: fixed string for titulars, random from group for subs
  let pos, groupHint='';
  if(typeof step === 'string'){
    pos = step;
  } else {
    // Sub group — resolve now and store so the same pos is used throughout this step
    if(!draftResolvedPos[draftStep]){
      draftResolvedPos[draftStep] = subPos(step.group);
    }
    pos = draftResolvedPos[draftStep];
    // Build hint showing all possible positions in the group
    const groupPosNames = SUB_GROUPS[step.group].map(p=>POS_NAMES[p]||p).join(' / ');
    groupHint = ` <span style="font-size:11px;color:var(--dim)">(${groupPosNames})</span>`;
  }

  // Build progress dots
  const dots = DRAFT_ORDER.map((_,i)=>`<div class="dp-dot ${i<draftStep?'done':i===draftStep?'active':''}"></div>`).join('');
  document.getElementById('dh-progress').innerHTML=dots;
  const stepLabel = DRAFT_LABELS[draftStep]||'';
  document.getElementById('dh-pos').innerHTML=`<span>${POS_NAMES[pos]||pos}</span>${groupHint}`;
  document.getElementById('dh-sub').textContent=`${stepLabel} · Elige 1 de 3 · ${draftStep+1}/${DRAFT_ORDER.length}`;
  document.getElementById('dh-club').textContent=G.clubName;

  // Pick 3 random players for this position (different clubs, not already drafted)
  const draftedNames = new Set(draftPicks.map(p=>p.name));
  let pool = POOL.filter(p=>p[2]===pos && !draftedNames.has(p[0]));
  // Shuffle and pick 3 from different clubs if possible
  pool = pool.sort(()=>Math.random()-.5);
  const usedClubs=new Set();
  const picks=[];
  for(const p of pool){
    if(!usedClubs.has(p[1])){usedClubs.add(p[1]);picks.push(poolToObj(p));}
    if(picks.length===3) break;
  }
  // fallback if not enough different clubs
  while(picks.length<3 && pool.length>picks.length){
    const p=poolToObj(pool[picks.length]);
    if(!picks.find(x=>x.name===p.name)) picks.push(p);
  }

  draftOptions=picks;
  draftSelected=-1;
  document.getElementById('draft-3').innerHTML=picks.map((p,i)=>makePlayerCard(p,i)).join('');
  document.getElementById('draft-confirm-btn').style.display='none';
}

function pickDraft(i){
  draftSelected=i;
  document.querySelectorAll('.pc').forEach(c=>c.classList.remove('chosen'));
  document.getElementById('dc-'+i).classList.add('chosen');
  document.getElementById('draft-confirm-btn').style.display='block';
}

function confirmDraftPick(){
  if(draftSelected<0) return;
  draftPicks.push({...draftOptions[draftSelected]});
  draftStep++;
  if(draftStep>=DRAFT_ORDER.length){
    showDraftSummary();
  } else {
    renderDraftStep();
  }
}

function generateMap(){
  const rivals=[...RIVALS].filter(r=>r.name!==G.clubName).sort(()=>Math.random()-.5);
  const nodeTypes=['sign','train','event','sponsor','train','sign','event','sponsor','sign','train'];
  const nodes=[]; let ri=0;
  for(let j=1;j<=38;j++){
    if(j>1&&j!==11&&j!==21&&j!==31){
      nodes.push({type:nodeTypes[(j-2)%nodeTypes.length],jornada:null,done:false,rival:null,result:null,isFork:false});
    }
    if(j===10||j===20||j===30){
      nodes.push({type:'checkpoint',jornada:null,done:false});
    }
    const isFork=[6,13,20,27,34].includes(j);
    const r1=rivals[ri%rivals.length];ri++;
    const r2=rivals[ri%rivals.length];ri++;
    nodes.push({type:'match',jornada:j,done:false,rival:r1,rival2:isFork?r2:null,result:null,isFork,chosenFork:0});
  }
  return nodes;
}

    else if(node.type==='sponsor'){title='Sponsor';sub='+15.000–30.000€';}
    const bodyC=isDone?'done':isCur?'act':isLck?'lck':'';
    w.innerHTML=`<div class="mn-dot ${dotCls} ${dotExtra}">${nodeIcon(node.type)}</div>
      <div class="mn-body ${bodyC}">
        <div class="mb-l"><div class="mb-t">${title}</div><div class="mb-s">${sub}</div></div>
        <div class="mb-r">${right}</div>
      </div>`;
    c.appendChild(w);
  });
}

function setFork(idx,ch){G.mapNodes[idx].chosenFork=ch;renderMap();}

function clickNode(idx){
  if(idx!==G.curNode) return;
  const n=G.mapNodes[idx];
  if(n.type==='match') openPre(idx);
  else if(n.type==='sign') openSign(idx);
  else if(n.type==='train') openTrain(idx);
  else if(n.type==='event') openEvent(idx);
  else if(n.type==='sponsor') openSponsor(idx);
}

function advance(){
  G.curNode++;
  if(G.curNode>=G.mapNodes.length){endSeason();return;}
  const n=G.mapNodes[G.curNode];
  if(n&&n.type==='checkpoint'){
    n.done=true;
    showAnn('🌍','Parón Internacional','Mercado ampliado en el siguiente nodo de fichaje.',null,()=>{G.curNode++;renderMap();showPg('map');});
    return;
  }
  renderMap();showPg('map');
}

function endSeason(){
  if(G.position<=3) showChampion(); else showGameOver('Temporada finalizada — '+G.position+'º puesto');
}

// ═══════════════════════════════════════════════════════
// MATCH ENGINE
// ═══════════════════════════════════════════════════════
const EV={
  goal_home:[
    {i:'⚽',t:p=>`¡GOL de ${p}!`,s:()=>'La pelota entra en la red.',c:'fg2'},
    {i:'⚽',t:p=>`¡GOLAZO de ${p}!`,s:()=>'Disparo desde fuera del área.',c:'fg2'},
  ],
  goal_away:[
    {i:'⚽',t:()=>'Gol del rival.',s:()=>'Empata el marcador.',c:'fdg'},
    {i:'⚽',t:()=>'El rival marca.',s:()=>'Contraataque letal.',c:'fdg'},
  ],
  save:[{i:'🧤',t:()=>'Gran parada',s:()=>'El portero evita el gol.',c:''}],
  chance:[{i:'💥',t:p=>`Ocasión de ${p}`,s:()=>'Al poste. Por poco.',c:''}],
  yellow:[{i:'🟨',t:p=>`Amarilla para ${p}`,s:()=>'El árbitro saca la cartulina.',c:''}],
  pressure:[
    {i:'⚡',t:()=>'Buen pressing del equipo',s:()=>'No dejan salir al rival con balón.',c:''},
    {i:'🎯',t:()=>'Combinación en el centro',s:()=>'Bonita jugada por el mediocampo.',c:''},
    {i:'🛡️',t:()=>'Defensa sólida',s:()=>'Sin fisuras por detrás.',c:''},
  ],
  halftime:[{i:'🔔',t:()=>'Descanso',s:()=>'Fin de la primera parte.',c:''}],
  start:[{i:'📣',t:()=>'Pitido inicial',s:()=>'¡Comienza el partido!',c:''}],
  end:[{i:'🏁',t:()=>'Pitido final',s:()=>'Ha terminado el partido.',c:''}],
};

function buildScript(win,draw){
  const evs=[],used=new Set([1,45,90]);
  function rm(lo,hi){let m;do{m=lo+Math.floor(Math.random()*(hi-lo));}while(used.has(m));used.add(m);return m;}
  const hp=G.squad.slice(0,11).map(p=>p.name);
  const ap=['el rival','su delantero','el visitante'];
  evs.push({m:1,t:'start',p:''});
  const hg=win?(Math.random()>.4?2:1):(draw?1:Math.random()>.6?1:0);
  const ag=win?hg-1:(draw?hg:hg+1);
  for(let i=0;i<hg;i++) evs.push({m:rm(10,85),t:'goal_home',p:rnd(hp)});
  for(let i=0;i<ag;i++) evs.push({m:rm(8,88),t:'goal_away',p:rnd(ap)});
  evs.push({m:rm(15,40),t:'chance',p:rnd(hp)});
  evs.push({m:rm(5,30),t:'pressure',p:''});
  evs.push({m:rm(20,60),t:'save',p:''});
  evs.push({m:rm(30,70),t:'yellow',p:rnd([...hp,...ap])});
  evs.push({m:45,t:'halftime',p:''});
  if(Math.random()>.6) evs.push({m:rm(55,80),t:'chance',p:rnd(hp)});
  evs.push({m:90,t:'end',p:''});
  evs.sort((a,b)=>a.m-b.m);
  return {evs,hg,ag};
}

function startMatch(idx,isHard){
  const {rival,hp,ap}=G.curMatch;
  let wc=hp/(hp+ap);
  if(preStyle==='presion') wc+=.04;
  if(preStyle==='contra') wc-=.02;
  wc=Math.max(.1,Math.min(.85,wc));
  const r=Math.random();
  const win=r<wc, draw=!win&&r<wc+.2;
  const {evs,hg,ag}=buildScript(win,draw);
  G.mEvents=evs;G.mEi=0;G.mHG=0;G.mAG=0;
  G.curMatch={...G.curMatch,idx,isHard:!!isHard,win,draw,rival};
  document.getElementById('m-hn').textContent=G.clubName;
  document.getElementById('m-an').textContent=rival.name;
  document.getElementById('m-sc').textContent='0 – 0';
  document.getElementById('m-mf').style.width='0%';
  document.getElementById('m-ml').textContent="Minuto 0'";
  document.getElementById('m-feed').innerHTML='';
  showPg('match');
  let cur=0;
  G.matchIv=setInterval(()=>{
    cur=Math.min(cur+3,90);
    document.getElementById('m-mf').style.width=(cur/90*100)+'%';
    document.getElementById('m-ml').textContent='Minuto '+cur+"'";
    while(G.mEi<G.mEvents.length&&G.mEvents[G.mEi].m<=cur){
      const ev=G.mEvents[G.mEi];
      const tpls=EV[ev.t]||EV.pressure;
      const tpl=rnd(tpls);
      if(ev.t==='goal_home') G.mHG++;
      if(ev.t==='goal_away') G.mAG++;
      document.getElementById('m-sc').textContent=G.mHG+' – '+G.mAG;
      const item=document.createElement('div');
      item.className='fi '+(tpl.c||'');
      item.innerHTML=`<div class="fi-m">${ev.m}'</div><div class="fi-i">${tpl.i}</div><div><div class="fi-t">${tpl.t(ev.p)}</div><div class="fi-s">${tpl.s()}</div></div>`;
      const feed=document.getElementById('m-feed');
      feed.appendChild(item);feed.scrollTop=feed.scrollHeight;
      G.mEi++;
    }
    if(cur>=90){clearInterval(G.matchIv);setTimeout(showResult,800);}
  },300);
}

function showResult(){
  const {win,draw,idx,isHard,rival}=G.curMatch;
  const node=G.mapNodes[idx];
  node.done=true;node.result={h:G.mHG,a:G.mAG};
  if(win){G.wins++;G.points+=3;}else if(draw){G.draws++;G.points+=1;}else{G.losses++;G.defeats++;}
  G.jornada=Math.min(38,G.mapNodes.filter(n=>n.type==='match'&&n.done).length+1);
  G.position=Math.max(1,Math.min(20,Math.round(20-G.points*.4)));
  const oc=win?'win':draw?'draw':'loss';
  const titles={win:'¡VICTORIA!',draw:'EMPATE',loss:'DERROTA'};
  const mor={
    win:{i:'🔥',t:'Moral alta — el vestuario está encendido',s:'+2 FÍS durante 1 jornada'},
    draw:{i:'😐',t:'Moral neutra',s:'Sin bonificaciones'},
    loss:{i:'😔',t:'Moral baja — el vestuario está tocado',s:'−2 DIS a delanteros 1 jornada'},
  };
  let rew='';
  if(isHard&&win){
    const ep=rnd(POOL.filter(p=>p[3]==='l').map(poolToObj));
    G.pendingElite={...ep};
    rew=`<div class="rew"><div class="rew-t">🏆 Recompensa ruta difícil</div><div class="rew-b">Desbloqueado: <strong>${ep.name} (${ep.pos} · Élite · OVR ${ovr(ep)})</strong></div></div>`;
  }
  if(!win&&!draw) rew+=`<div class="rew" style="background:rgba(224,80,80,.07);border-color:rgba(224,80,80,.2);"><div class="rew-t" style="color:var(--red);">⚠️ Derrotas: ${G.defeats}/5</div><div class="rew-b">${G.defeats>=5?'Temporada terminada.':'Otras '+(5-G.defeats)+' y es game over.'}</div></div>`;
  const m=mor[oc];
  document.getElementById('res-content').innerHTML=`
    <div class="rh"><div class="rh-t r${oc.slice(0,3)}">${titles[oc]}</div><div class="rh-sc">${G.mHG} – ${G.mAG}</div><div class="rh-m">${G.clubName} vs ${rival.name} · J${node.jornada}</div></div>
    <div class="rst">
      <div class="rs-b"><div class="rs-v">${rndI(4,14)}</div><div class="rs-l">Tiros</div></div>
      <div class="rs-b"><div class="rs-v">${rndI(44,62)}%</div><div class="rs-l">Posesión</div></div>
      <div class="rs-b"><div class="rs-v">${rndI(1,6)}</div><div class="rs-l">Paradas</div></div>
    </div>
    ${rew}
    <div class="mor"><div class="mor-i">${m.i}</div><div><div class="mor-t">${m.t}</div><div class="mor-s">${m.s}</div></div></div>
    <button class="btn btn-lg bg" onclick="afterResult()">Continuar →</button>`;
  showPg('result');
}

function afterResult(){
  if(G.defeats>=5){showGameOver('Has acumulado 5 derrotas. Temporada terminada.');return;}
  advance();
}

function renderSquad(){
  const groups={PT:[],CB:[],LI:[],LD:[],MCD:[],MC:[],SD:[],EI:[],ED:[],DC:[]};
  const labels={PT:'Porteros',CB:'Defensas',LI:'Lateral Izq.',LD:'Lateral Der.',MCD:'Pivote',MC:'Centrocampistas',SD:'Media punta',EI:'Extremo Izq.',ED:'Extremo Der.',DC:'Delanteros'};
  G.squad.forEach(p=>{const k=groups[p.pos]!=null?p.pos:'MC';(groups[k]||(groups[k]=[])).push(p);});
  let html='<div style="height:4px;"></div>';
  Object.entries(groups).forEach(([pos,pls])=>{
    if(!pls.length) return;
    html+=`<div style="margin-bottom:18px;"><div class="sl">${labels[pos]||pos}</div>${pls.map(makeSquadCard).join('')}</div>`;
  });
  document.getElementById('sq-content').innerHTML=html;
}

function closeAnn(){document.getElementById('ann').classList.remove('on');if(annCb){annCb();annCb=null;}}
</script>
